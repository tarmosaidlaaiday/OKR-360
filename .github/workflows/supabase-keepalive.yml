name: Supabase keep-alive

on:
  schedule:
    # Every Monday at 09:17 UTC — off-peak, avoids the :00/:30 thundering herd
    - cron: '17 9 * * 1'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          echo "Pinging Supabase at $(date -u)"

          # Read-only GET ping — fetches one org row to wake the DB without
          # writing anything. Avoids the permissive INSERT policy entirely.
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            "$SUPABASE_URL/rest/v1/organisations?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")

          echo "HTTP status: $RESPONSE"

          if [ "$RESPONSE" = "200" ]; then
            echo "Supabase is active"
          else
            echo "Unexpected response: $RESPONSE" >&2
            exit 1
          fi
